name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'safira_backend/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'safira_backend/**'
      - '.github/workflows/ci-cd.yml'

defaults:
  run:
    working-directory: safira_backend

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: safira_backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      # No .spec.ts files exist in the repo yet; --passWithNoTests keeps this
      # from failing today but still runs real tests as soon as they're added.
      - name: Test
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  docker-build:
    needs: lint-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed — Render builds its own from the Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: safira_backend
          push: false
          tags: safira-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}'
          method: 'POST'
